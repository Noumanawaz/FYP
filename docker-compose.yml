version: '3.8'

services:
  # Frontend Service (Ports 80 and 443)
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_UPLIFT_API_KEY: ${VITE_UPLIFT_API_KEY}
        VITE_GEOAPIFY_API_KEY: ${VITE_GEOAPIFY_API_KEY}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
    container_name: vocabite-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend-api
      - backend-rag
    env_file:
      - ./Frontend/.env
    environment:
      NODE_ENV: production
    networks:
      - vocabite-network
    volumes:
      - ./nginx/vocabite.conf:/etc/nginx/conf.d/default.conf
      - ~/certs:/etc/nginx/certs

  # Backend API Service (Port 3000)
  backend-api:
    build:
      context: ./Backend/API
      dockerfile: Dockerfile
    container_name: vocabite-api
    ports:
      - "3000:3000"
    env_file:
      - ./Backend/API/.env
    restart: always
    networks:
      - vocabite-network

  # Backend RAG Service (Port 8000)
  backend-rag:
    build:
      context: ./Backend/RAG
      dockerfile: Dockerfile
    container_name: vocabite-rag
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/RAG/.env
    restart: always
    networks:
      - vocabite-network

networks:
  vocabite-network:
    driver: bridge