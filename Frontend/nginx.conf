server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Support for React Router (Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to node-api container
    location /api/v1 {
        proxy_pass http://backend-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy WebSocket and Chatbot requests to python-rag container
    # Direct chat/ingest endpoints
    location ~ ^/(chat|ingest-restaurant|health) {
        proxy_pass http://backend-rag:8000;
        proxy_set_header Host $host;
    }

    # Proxy the specific WebSocket endpoint
    location /ws/voice {
        proxy_pass http://backend-rag:8000/ws/voice;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
